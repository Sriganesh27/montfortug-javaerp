<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="theme-color" content="#0f172a">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <!-- Strict CSP blocks hackers from injecting unauthorized scripts -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;">

  <link rel="icon" type="image/webp" href="/assets/Images/logo_MBSG_UG_8.webp">
  <title>ERP Login | Montfort Brothers of St. Gabriel:Uganda</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="login-container">
  <div class="login-header">
    <img src="/assets/Images/logo_MBSG_UG_8.webp" alt="Logo" class="login-logo">
    <h2>Montfort Brothers of St. Gabriel:Uganda</h2>
    <p>ERP Login</p>
  </div>

  <div id="errorMessage" class="error-box"></div>

  <form id="loginForm">
    <div class="form-group" id="campusGroup">
      <label>Campus Location</label>
      <div class="input-wrapper">
        <i class="bi bi-buildings"></i>
        <select id="branchId" required>
          <option value="" disabled selected>Select Campus</option>
          <option value="1">St. Kizito (Kyebando)</option>
          <option value="2">St. Montfort (Mpala)</option>
          <option value="3">Pere Achte (Isunga)</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Account Role</label>
      <div class="input-wrapper">
        <i class="bi bi-shield-lock"></i>
        <select id="role" required>
          <option value="" disabled selected>Select Role</option>
          <option value="PARENT">Parent</option>
          <option value="SUPER_ADMIN">Super Admin</option>
          <option value="SCHOOL_ADMIN">School Admin</option>
          <option value="ACADEMIC_COORDINATOR">Academic Coordinator</option>
          <option value="ADMISSION_STAFF">Admission Staff</option>
          <option value="FEE_OFFICER">Fee Officer</option>
          <option value="TEACHER">Teacher</option>
          <option value="AUDITOR">Auditor</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <i class="bi bi-person"></i>
        <input type="text" id="username" placeholder="Username / Email" autocomplete="username" required>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i class="bi bi-lock"></i>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
      </div>
    </div>

    <button type="submit" class="login-btn" id="loginBtn">
      <span class="btn-text">Login</span>
    </button>
  </form>

  <div class="footer-text mt-20">
    &copy; <span id="currentYear">2026</span> Montfort Brothers of St. Gabriel:Uganda
  </div>
</div>

<!-- ZERO inline JavaScript -->
<script src="js/auth.js"></script>
</body>
</html>
