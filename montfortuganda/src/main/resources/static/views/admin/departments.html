<div id="ba-departments-view">

    <div id="ba-deptTableComponent">
        <div class="view-header">
            <h2>Manage Departments</h2>
        </div>

        <!-- Same premium search panel and table as before -->
        <div class="card mb-3 p-3">
            <div class="ba-flex-panel">
                <div class="form-group ba-flex-1">
                    <label>Search Keyword</label>
                    <input type="text" id="ba-searchKeyword" class="detail-input w-100" placeholder="Name or Code...">
                </div>
                <!-- ... (Other filters remain identical) ... -->
                <div class="form-group ba-pagination-controls">
                    <button type="button" id="ba-searchBtn" class="btn-primary"><i class="bi bi-search"></i> Search</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="data-table" id="ba-deptTable">
                    <thead>
                    <tr>
                        <th data-sort="CODE">Code <i class="bi bi-arrow-down-up"></i></th>
                        <th data-sort="NAME">Name <i class="bi bi-arrow-down-up"></i></th>
                        <th>Status</th>
                        <th class="col-action align-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="ba-deptTableBody"></tbody>
                </table>
            </div>
            <!-- Pagination area identical to previous -->
        </div>
    </div>

    <!-- INLINE EDIT COMPONENT (Hidden by default) -->
    <div id="ba-deptFormComponent" class="hidden">
        <div class="view-header">
            <h2>Edit Department: <span id="view-deptNameHeader"></span></h2>
            <div class="action-btn-group">
                <button type="button" id="ba-backToTableBtn" class="btn-secondary"><i class="bi bi-arrow-left"></i> Back</button>
                <button type="button" id="ba-saveDeptBtn" class="btn-success"><i class="bi bi-save"></i> Update Details</button>
            </div>
        </div>

        <div class="card ba-form-container">
            <div id="ba-formOverlay" class="ba-form-overlay hidden" aria-live="assertive">
                <h4><i class="bi bi-arrow-repeat spin"></i> Updating securely...</h4>
            </div>

            <form class="detail-grid p-3" id="ba-deptFormFields">
                <input type="hidden" id="edit-deptId">
                <div class="form-group">
                    <label>Department Name <span class="text-danger">*</span></label>
                    <input type="text" class="detail-input" id="edit-deptName" maxlength="100">
                </div>
            </form>
                <!-- Other inputs identical to Add page -->
            </div>
        </div>
    </div>

    <template id="tpl-dept-row">
        <tr>
            <td class="td-code"></td>
            <td class="td-name"><strong></strong></td>
            <td class="td-status"></td>
            <td class="col-action align-center">
                <button type="button" class="btn-icon btn-edit" title="Edit"><i class="bi bi-pencil"></i></button>
                <button type="button" class="btn-icon btn-delete text-danger hidden" title="Deactivate"><i class="bi bi-trash"></i></button>
            </td>
        </tr>
    </template>
</div>
