<div class="view-container">
    <!-- List View -->
    <div id="ba-module-list-view">
        <div class="view-header mb-4 d-flex justify-content-between align-items-center">
            <h2>Module Dashboard</h2>
            <div class="action-btn-group">
                <button type="button" id="btn-add-record" class="btn-primary">
                    <i class="bi bi-plus-circle"></i> Add New
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="erp-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="module-table-body">
                    <!-- Rows dynamically injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Detail/Add View -->
    <div id="ba-module-detail-view" class="hidden">
        <div class="view-header mb-4 d-flex justify-content-between align-items-center">
            <h2 id="module-detail-title">Add New Record</h2>
            <div class="action-btn-group">
                <button type="button" id="btn-back-to-list" class="btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </button>
            </div>
        </div>

        <div class="card p-4">
            <form id="module-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="record-name">Name <span class="text-danger">*</span></label>
                        <input type="text" id="record-name" name="name" class="detail-input w-100" required maxlength="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="record-status">Status</label>
                        <select id="record-status" name="active" class="detail-input w-100">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions mt-4">
                    <button type="submit" id="btn-save-record" class="btn-primary">
                        <i class="bi bi-save"></i> Save Record
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
