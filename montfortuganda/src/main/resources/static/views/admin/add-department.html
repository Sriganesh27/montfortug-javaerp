<div id="ba-add-dept-view">
    <div class="view-header">
        <h2>Add New Department</h2>
        <button id="ba-backToDeptsBtn" class="btn-secondary"><i class="bi bi-list"></i> View All</button>
    </div>

    <div class="card ba-form-container">
        <!-- Secure Overlay prevents double-click submission -->
        <div id="ba-addDeptOverlay" class="ba-form-overlay hidden">
            <h4><i class="bi bi-arrow-repeat spin"></i> Saving securely...</h4>
        </div>

        <div class="card-header">
            <h3>Department Details</h3>
        </div>

        <div class="detail-grid p-3" id="ba-addDeptFields">
            <div class="form-group">
                <label>Department Name <span class="text-danger">*</span></label>
                <input type="text" class="detail-input" id="add-deptName" maxlength="100">
            </div>

            <div class="form-group">
                <label>Department Type</label>
                <select class="detail-input" id="add-deptType">
                    <option value="ACADEMIC">Academic</option>
                    <option value="NON_ACADEMIC">Non-Academic</option>
                </select>
            </div>

            <div class="form-group">
                <label>Display Order</label>
                <input type="number" class="detail-input" id="add-deptOrder" value="100" min="1" max="999">
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" class="detail-input" id="add-deptDesc" maxlength="500">
            </div>
        </div>

        <div class="form-actions p-3 border-top">
            <button type="button" class="btn-success btn-large" id="ba-saveNewDeptBtn">
                <i class="bi bi-save"></i> Create Department
            </button>
        </div>
    </div>
</div>
