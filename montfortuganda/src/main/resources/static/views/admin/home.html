<div id="admin-branch-dashboard-view">

    <div class="view-header">
        <h2>Branch Dashboard</h2>
        <p class="text-subtitle" id="ba-dashboard-subtitle">Welcome back! Fetching live statistics...</p>
    </div>

    <!-- Reusing your exact Enterprise Grid from superadmin.css -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon icon-blue"><i class="bi bi-file-earmark-text"></i></div>
            <div class="stat-details">
                <h3>Total Applications</h3>
                <h1 id="ba-statTotalApps">0</h1>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon icon-orange"><i class="bi bi-hourglass-split"></i></div>
            <div class="stat-details">
                <h3>Pending Verification</h3>
                <h1 id="ba-statPending">0</h1>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon icon-green"><i class="bi bi-check-circle"></i></div>
            <div class="stat-details">
                <h3>Approved / Enrolled</h3>
                <h1 id="ba-statApproved">0</h1>
            </div>
        </div>
    </div>



</div>
