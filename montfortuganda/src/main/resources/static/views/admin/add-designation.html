<div id="ba-add-desig-view">
    <div class="view-header">
        <div>
            <h2>Add New Designation</h2>
            <p class="text-muted">Register a new staff/admin designation</p>
        </div>
        <div>
            <button id="backToDesignationsBtn" class="btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Designations
            </button>
        </div>
    </div>

    <div class="card form-card mx-auto">
        <div class="card-header border-bottom">
            <h3 class="card-title">Designation Information</h3>
        </div>
        <div class="card-body">
            <form id="add-desig-form">

                <div class="ba-detail-grid">
                    <div class="form-group">
                        <label for="add-desigCode">Designation Code <span class="text-danger">*</span></label>
                        <input type="text" id="add-desigCode" class="detail-input w-100" placeholder="e.g. DES_TECH" required maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="add-desigName">Designation Name <span class="text-danger">*</span></label>
                        <input type="text" id="add-desigName" class="detail-input w-100" placeholder="e.g. Senior Lecturer" required maxlength="100">
                    </div>
                </div>

                <div class="form-group">
                    <label for="add-desigDescription">Description</label>
                    <textarea id="add-desigDescription" class="detail-input w-100" rows="4" placeholder="Brief description..." maxlength="500"></textarea>
                </div>

                <div class="form-actions border-top pt-4">
                    <button type="reset" class="btn-secondary">Reset Form</button>
                    <button type="submit" class="btn-primary"><i class="bi bi-save"></i> Save Designation</button>
                </div>
            </form>
        </div>
    </div>
</div>
