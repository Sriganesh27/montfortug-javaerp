<div id="ba-add-desig-view">
    <div class="view-header">
        <h2>Add New Designation</h2>
        <button id="ba-backToDesigsBtn" class="btn-secondary"><i class="bi bi-list"></i> View All</button>
    </div>

    <div class="card ba-form-container">
        <!-- Secure Overlay prevents double-click submission -->
        <div id="ba-addDesigOverlay" class="ba-form-overlay hidden">
            <h4><i class="bi bi-arrow-repeat spin"></i> Saving securely...</h4>
        </div>

        <div class="card-header">
            <h3>Designation Details</h3>
        </div>

        <div class="detail-grid p-3" id="ba-addDesigFields">

            <div class="form-group">
                <label>Parent Department <span class="text-danger">*</span></label>
                <select class="detail-input" id="add-desigDeptId">
                    <option value="">Loading active departments...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Designation Name <span class="text-danger">*</span></label>
                <input type="text" class="detail-input" id="add-desigName" maxlength="100">
            </div>

            <div class="form-group">
                <label>Display Order</label>
                <input type="number" class="detail-input" id="add-desigOrder" value="100" min="1" max="999">
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" class="detail-input" id="add-desigDesc" maxlength="500">
            </div>
        </div>

        <div class="form-actions p-3 border-top">
            <button type="button" class="btn-success btn-large" id="ba-saveNewDesigBtn">
                <i class="bi bi-save"></i> Create Designation
            </button>
        </div>
    </div>
</div>
