<div id="superadmin-users-view">
    <!-- MAIN TABLE VIEW -->
    <div id="sa-usersTableView">
        <div class="view-header">
            <div>
                <h2 class="view-title">Manage Users</h2>
            </div>
            <!-- Add User button routes to an Add User page (coming later!) -->
            <a href="/superadmin/add-user" class="btn-primary" id="sa-routeAddUserBtn">
                <i class="bi bi-person-plus"></i> Add New User
            </a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="data-table" id="sa-usersTable">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Branch Code</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="sa-usersTableBody">
                </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- VIEW MORE / INLINE EDIT PAGE -->
    <div id="sa-userDetailView" class="hidden">
        <div class="view-header">
            <h2>User Details: <span id="detail-userNameHeader"></span></h2>
            <div class="action-btn-group">
                <button id="sa-backToUsersTableBtn" class="btn-secondary"><i class="bi bi-arrow-left"></i> Back</button>
                <button id="sa-resetPasswordBtn" class="btn-secondary"><i class="bi bi-key"></i> Reset Password</button>
                <button id="sa-editUserBtn" class="btn-primary"><i class="bi bi-pencil"></i> Edit Mode</button>
                <button id="sa-cancelEditUserBtn" class="btn-secondary hidden"><i class="bi bi-x-circle"></i> Cancel</button>
                <button id="sa-saveUserBtn" class="btn-success hidden"><i class="bi bi-save"></i> Save Changes</button>
            </div>
        </div>

        <div class="card">
            <div class="detail-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <span class="detail-text" id="view-userFullName"></span>
                    <input type="text" class="detail-input hidden" id="edit-userFullName">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <span class="detail-text highlighted-username readonly-always" id="view-userUsername"></span>
                </div>
                <div class="form-group">
                    <label>System Role</label>
                    <span class="detail-text" id="view-userRole"></span>
                    <select class="detail-input hidden" id="edit-userRole">
                        <option value="BRANCH_ADMIN">Branch Admin</option>
                        <option value="ROLE_TEACHER">Teacher</option>
                        <option value="ROLE_STUDENT">Student</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Assigned Branch Code</label>
                    <span class="detail-text" id="view-userBranchCode"></span>
                    <input type="text" class="detail-input hidden" id="edit-userBranchCode" placeholder="Leave blank for Super Admin">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <span class="detail-text" id="view-userPhone"></span>
                    <input type="text" class="detail-input hidden" id="edit-userPhone">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <span class="detail-text" id="view-userEmail"></span>
                    <input type="email" class="detail-input hidden" id="edit-userEmail">
                </div>
            </div>
        </div>
    </div>

    <!-- PURE DOM ROW TEMPLATE -->
    <template id="user-row-template">
        <tr>
            <td class="col-id"></td>
            <td class="col-name"><strong></strong></td>
            <td class="col-username"></td>
            <td class="col-role"></td>
            <td class="col-branch"></td>
            <td class="col-status">
                <label class="switch">
                    <input type="checkbox" class="user-status-toggle">
                    <span class="slider round"></span>
                </label>
            </td>
            <td class="col-actions">
                <button class="action-btn view-user-btn"><i class="bi bi-eye"></i> View</button>
            </td>
        </tr>
    </template>
</div>
