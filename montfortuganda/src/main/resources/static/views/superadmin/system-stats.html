<div id="superadmin-stats-view">
    <div class="view-header">
        <h2>Global System Statistics</h2>
    </div>

    <!-- 4 TOP STAT CARDS -->
    <div class="stats-grid stats-grid-4">
        <div class="stat-card">
            <div class="stat-icon icon-blue"><i class="bi bi-buildings"></i></div>
            <div class="stat-details">
                <h3>Total Branches</h3>
                <h1 id="global-stat-branches">0</h1>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-green"><i class="bi bi-people"></i></div>
            <div class="stat-details">
                <h3>Total Students</h3>
                <h1 id="global-stat-students">0</h1>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-orange"><i class="bi bi-person-badge"></i></div>
            <div class="stat-details">
                <h3>Total Staff</h3>
                <h1 id="global-stat-staff">0</h1>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-purple"><i class="bi bi-activity"></i></div>
            <div class="stat-details">
                <h3>Active Sessions</h3>
                <h1 id="global-stat-sessions">0</h1>
            </div>
        </div>
    </div>

    <!-- DETAILED GRIDS (Enrollment & Server Health) -->
    <div class="dashboard-split">

        <!-- LEFT: Branch Enrollment Breakdown -->
        <div class="card p-4">
            <div class="card-header">
                <h3>Branch Enrollment Breakdown</h3>
            </div>
            <div id="enrollment-breakdown-list" class="progress-list">
                <!-- Cloned securely via JS Template -->
            </div>
        </div>

        <!-- RIGHT: System Health -->
        <div class="card p-4">
            <div class="card-header">
                <h3>System Health Monitor</h3>
            </div>
            <div class="progress-list">
                <div>
                    <div class="progress-item-header">
                        <span>Database Storage</span>
                        <strong id="health-storage-text">14.2 GB / 50 GB</strong>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill fill-blue" style="width: 28%;"></div>
                    </div>
                </div>
                <div>
                    <div class="progress-item-header">
                        <span>Server CPU Load</span>
                        <strong id="health-cpu-text">12%</strong>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill fill-green" style="width: 12%;"></div>
                    </div>
                </div>
                <div>
                    <div class="progress-item-header">
                        <span>API Latency</span>
                        <strong id="health-latency-text">45ms</strong>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill fill-purple" style="width: 5%;"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- PURE HTML TEMPLATE: Branch Enrollment Row -->
    <template id="enrollment-row-template">
        <div>
            <div class="progress-item-header">
                <span class="branch-name"></span>
                <strong class="branch-count"></strong>
            </div>
            <div class="progress-track slim">
                <div class="progress-fill fill-dark branch-bar" style="width: 0%;"></div>
            </div>
        </div>
    </template>
</div>
