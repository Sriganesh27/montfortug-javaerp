<div id="superadmin-branches-view">
  <!-- MAIN TABLE VIEW -->
  <div id="sa-branchTableView">
    <div class="view-header">
      <h2>Manage Branches</h2>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="data-table" id="sa-branchesTable">
          <thead>
          <tr>
            <th>ID</th>
            <th>School Name</th>
            <th>Code</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody id="sa-branchesTableBody">
          <!-- Left blank. Populated purely via JS template cloning -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- VIEW MORE / INLINE EDIT PAGE -->
  <div id="sa-branchDetailView" class="hidden">
    <div class="view-header">
      <h2>Branch Details: <span id="detail-schoolNameHeader"></span></h2>
      <div class="action-btn-group">
        <button id="sa-printBranchBtn" class="btn-secondary"><i class="bi bi-printer"></i> Print</button>
        <button id="sa-backToTableBtn" class="btn-secondary"><i class="bi bi-arrow-left"></i> Back</button>
        <button type="button" class="btn-primary" id="sa-backupBranchBtn"><i class="bi bi-cloud-download"></i> Export Data</button>
        <button id="sa-editBranchBtn" class="btn-primary"><i class="bi bi-pencil"></i> Edit Mode</button>
        <button id="sa-cancelEditBtn" class="btn-secondary hidden"><i class="bi bi-x-circle"></i> Cancel</button>
        <button id="sa-saveBranchBtn" class="btn-success hidden"><i class="bi bi-save"></i> Save Changes</button>
      </div>
    </div>

    <!-- MOVED: STATS GRID IS NOW INSIDE THE DETAIL VIEW -->
    <div class="stats-grid branch-stats-grid">
      <div class="stat-card">
        <div class="stat-icon icon-blue"><i class="bi bi-people"></i></div>
        <div class="stat-details">
          <h3>Total Students</h3>
          <h1 id="view-statStudents">0</h1>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-orange"><i class="bi bi-person-badge"></i></div>
        <div class="stat-details">
          <h3>Total Staff</h3>
          <h1 id="view-statStaff">0</h1>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-green"><i class="bi bi-check2-circle"></i></div>
        <div class="stat-details">
          <h3>Avg Attendance</h3>
          <h1 id="view-statAttendance">0%</h1>
        </div>
      </div>
    </div>

    <div class="card" id="printable-area">
      <div class="detail-grid">
        <!-- Basic Info -->
        <div class="form-group">
          <label>School Name</label>
          <span class="detail-text" id="view-branchName"></span>
          <input type="text" class="detail-input hidden" id="edit-branchName">
        </div>
        <div class="form-group">
          <label>School Code</label>
          <span class="detail-text" id="view-schoolCode"></span>
          <input type="text" class="detail-input hidden" id="edit-schoolCode">
        </div>
        <div class="form-group">
          <label>Admin Credentials</label>
          <div class="inline-action-group">
            <span class="detail-text highlighted-username readonly-always" id="view-adminUsername"></span>
            <button type="button" class="btn-secondary btn-nowrap" id="sa-resetBranchAdminPwdBtn">
              <i class="bi bi-key"></i> Reset Password
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Branch Type</label>
          <span class="detail-text" id="view-branchType"></span>
          <input type="text" class="detail-input hidden" id="edit-branchType" placeholder="Nursery, Primary, Secondary">
        </div>
        <div class="form-group">
          <label>Foundation Date</label>
          <span class="detail-text" id="view-foundationDate"></span>
          <input type="date" class="detail-input hidden" id="edit-foundationDate">
        </div>
        <div class="form-group">
          <label>Location</label>
          <span class="detail-text" id="view-branchLocation"></span>
          <input type="text" class="detail-input hidden" id="edit-branchLocation">
        </div>
        <div class="form-group">
          <label>Contact Details</label>
          <span class="detail-text" id="view-contactDetails"></span>
          <input type="text" class="detail-input hidden" id="edit-contactDetails">
        </div>

        <!-- JSON Incharge Details -->
        <div class="form-group full-width-group">
          <label>Incharge Details</label>

          <!-- VIEW MODE -->
          <div class="detail-text json-detail-box" id="view-inchargeDetails"></div>

          <!-- EDIT MODE (Dynamic Table) -->
          <div class="detail-input edit-incharge-container hidden" id="edit-inchargeDetails-container">
            <table class="data-table edit-incharge-table">
              <thead>
              <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Phone</th>
                <th class="col-action align-center">Action</th>
              </tr>
              </thead>
              <tbody id="edit-incharge-tbody">
              <!-- Populated via JS Template -->
              </tbody>
            </table>
            <button type="button" class="btn-secondary btn-add-incharge" id="edit-addInchargeRowBtn">
              <i class="bi bi-plus-circle"></i> Add Person
            </button>
          </div>
        </div>

        <!-- Photos and Documents -->
        <div class="form-group">
          <label>School Photo</label>
          <img id="view-schoolPhoto" class="preview-image hidden" src="" alt="School Photo"/>
          <input type="file" class="detail-input hidden" id="edit-schoolPhoto" accept="image/png, image/jpeg">
        </div>
        <div class="form-group">
          <label>Govt Document</label>
          <div id="view-govDocument" class="document-container"></div>
          <input type="file" class="detail-input hidden" id="edit-govDocument">
        </div>
      </div>
    </div>

    <!-- MOVED: AUDIT LOGS CARD IS NOW INSIDE THE DETAIL VIEW -->
    <div class="card audit-logs-card">
      <div class="audit-card-header">
        <h3>Recent Activity Logs</h3>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead>
          <tr>
            <th>Date & Time</th>
            <th>User / Role</th>
            <th>Action Performed</th>
          </tr>
          </thead>
          <tbody id="view-auditLogTbody">
          <!-- Cloned securely via JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div> <!-- THIS CLOSES sa-branchDetailView SO IT CAN BE HIDDEN! -->

  <!-- PURE HTML TEMPLATES (Never write HTML inside JS!) -->
  <template id="branch-row-template">
    <tr>
      <td class="col-id"></td>
      <td class="col-name"><strong></strong></td>
      <td class="col-code"></td>
      <td class="col-type"></td>
      <td class="col-status">
        <label class="switch">
          <input type="checkbox" class="status-toggle">
          <span class="slider round"></span>
        </label>
      </td>
      <td class="col-actions">
        <button class="action-btn view-more-btn"><i class="bi bi-eye"></i> View More</button>
      </td>
    </tr>
  </template>

  <!-- View Mode Incharge Table Template -->
  <template id="incharge-view-table-template">
    <table class="data-table">
      <thead>
      <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Phone</th>
      </tr>
      </thead>
      <tbody class="incharge-view-tbody"></tbody>
    </table>
  </template>

  <!-- Edit Mode Incharge Row Template -->
  <template id="incharge-edit-row-template">
    <tr>
      <td><input type="text" class="incharge-input inc-name" placeholder="Name"></td>
      <td><input type="text" class="incharge-input inc-role" placeholder="Role"></td>
      <td><input type="text" class="incharge-input inc-phone" placeholder="Phone"></td>
      <td class="col-action align-center">
        <button type="button" class="action-btn delete-btn remove-inc-btn"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  </template>

  <!-- GLOBAL PREMIUM MODAL TEMPLATE -->
  <template id="premium-modal-template">
    <div class="premium-modal-overlay">
      <div class="premium-modal-box">
        <div class="premium-modal-header">
          <div class="premium-modal-icon"><i class="bi"></i></div>
          <h3 class="pm-title"></h3>
        </div>
        <div class="premium-modal-body"></div>
        <div class="premium-modal-footer">
          <button class="premium-modal-btn-secondary pm-btn-cancel hidden"></button>
          <button class="premium-modal-btn-primary pm-btn-confirm"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ADD BRANCH SUCCESS CONTENT TEMPLATE -->
  <template id="branch-success-content-template">
    <div class="pm-text-block">
      The branch <strong class="success-branch-name"></strong> has been successfully configured.
    </div>
    <div class="pm-text-block pm-spacer">
      An Administrator account was automatically generated. Please securely save these credentials:
    </div>
    <div class="credentials-box">
      <p><strong>Username:</strong> <span class="cred-username"></span></p>
      <p><strong>Password:</strong> <span class="cred-password"></span></p>
    </div>
  </template> <!-- FIXED: This template is now properly closed! -->

  <!-- DOM TEMPLATE: Audit Log Row -->
  <template id="audit-log-row-template">
    <tr>
      <td class="log-date"></td>
      <td class="log-user"></td>
      <td class="log-action"></td>
    </tr>
  </template>

</div> <!-- Closes superadmin-branches-view -->
