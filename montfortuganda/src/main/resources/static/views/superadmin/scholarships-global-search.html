<div id="superadmin-global-search-view">
    <div class="view-header">
        <div>
            <h2>Scholarship Applications</h2>
        </div>
    </div>

    <!-- 1. CSS ANALYTICS DASHBOARD (CLEANED SKELETON) -->
    <div class="analytics-grid mb-20">
        <!-- Analytics Card 1: Donut Chart -->
        <div class="card analytics-card m-0 full-height-card">
            <h3 class="card-title text-uppercase-sm">Total Global Deficit</h3>

            <div class="css-chart-wrapper">
                <!-- Percentage defaults to 0% until JS loads -->
                <div class="css-donut" style="--percentage: 0; --chart-color: #ef4444;">
                    <div class="donut-hole">
                        <span class="donut-text">0%</span>
                        <span class="donut-subtext">Deficit</span>
                    </div>
                </div>

                <div class="chart-legend" id="global-deficit-legend">
                    <p><span class="badge-pending" id="gs-unfunded-badge">UGX 0</span> Unfunded</p>
                    <p class="text-muted text-sm mt-5" id="gs-total-need-text">Out of UGX 0 Total Need</p>
                </div>
            </div>
        </div>

        <!-- Analytics Card 2: Pending Requests -->
        <div class="card analytics-card m-0 full-height-card">
            <h3 class="card-title text-uppercase-sm">Pending Branch Requests</h3>
            <!-- Empty container waiting for Javascript to inject the rows -->
            <div class="pending-stats-list" id="dynamic-branch-stats">
            </div>
        </div>
    </div>

    <!-- 2. FILTER CARD -->
    <div class="card filter-card">
        <div class="filter-grid">
            <div class="form-group">
                <label>Branch / School</label>
                <select id="gs-branch-filter">
                    <option value="">All Branches</option>
                </select>
            </div>
            <div class="form-group">
                <label>Education Level</label>
                <select id="gs-level-filter">
                    <option value="">All Levels</option>
                </select>
            </div>
            <div class="form-group">
                <label>Class</label>
                <select id="gs-class-filter">
                    <option value="">All Classes</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="gs-category-filter">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gs-gender-filter">
                    <option value="">All Genders</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>

        <div class="filter-actions justify-between flex-wrap">
            <div class="form-group m-0 search-bar-wrapper">
                <div class="input-icon-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" id="gs-search-input" placeholder="Search applicant name...">
                </div>
            </div>

            <div class="flex-row align-center gap-15 flex-wrap">
                <div class="flex-row align-center gap-10">
                    <label class="m-0 text-uppercase-sm text-bold">STATUS:</label>
                    <select id="gs-status-filter" class="status-select">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                    </select>
                </div>
                <button type="button" id="gs-reset-btn" class="btn-secondary">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset
                </button>
                <button type="button" id="gs-apply-btn" class="btn-primary">
                    <i class="bi bi-funnel"></i> Apply Filters
                </button>
            </div>
        </div>
    </div>

    <!-- 3. DATA TABLE -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Student Applications</h3>
            <div class="badge-active bg-dark" id="gs-results-count">0 Found</div>
        </div>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Applicant</th>
                    <th>Demographics</th>
                    <th>Branch</th>
                    <th>Level & Class</th>
                    <th>Category</th>
                    <th>Approval Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="gs-table-body">
                </tbody>
            </table>
        </div>

        <div class="pagination-footer">
            <div class="pagination-info">
                Showing <span id="gs-page-start">0</span> to <span id="gs-page-end">0</span> of <span id="gs-total-entries">0</span> entries
            </div>
            <div class="pagination-controls">
                <button class="btn-page" id="gs-prev-page" disabled><i class="bi bi-chevron-left"></i></button>
                <div class="page-numbers" id="gs-page-numbers">
                    <button class="btn-page active">1</button>
                </div>
                <button class="btn-page" id="gs-next-page" disabled><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- PURE HTML TEMPLATE FOR TABLE ROW -->
    <template id="gs-row-template">
        <tr>
            <td class="col-id text-muted text-sm"></td>
            <td>
                <div class="flex-row gap-12 align-center">
                    <div class="profile-circle circle-40 col-initials"></div>
                    <strong class="col-name text-dark"></strong>
                </div>
            </td>
            <td class="col-demo text-muted text-sm"></td>
            <td class="col-branch text-bold"></td>
            <td class="col-level"></td>
            <td class="col-category"></td>
            <td><span class="col-status"></span></td>
            <td>
                <button class="btn-primary col-action-btn text-sm px-15"><i class="bi bi-pencil-square"></i> Process</button>
            </td>
        </tr>
    </template>
    <template id="pending-stat-row-template">
        <div class="pending-stat-row d-flex justify-content-between align-items-center mb-2">
            <span class="stat-branch-name fw-bold text-dark"></span>
            <span class="stat-branch-count badge bg-danger bg-opacity-10 text-danger rounded-pill px-2"></span>
        </div>
    </template>
</div>
