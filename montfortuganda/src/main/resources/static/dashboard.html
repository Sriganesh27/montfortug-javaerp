<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Privacy and Indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/webp" href="/assets/Images/logo_MBSG_UG_8.webp">

    <!-- Strict CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;">

    <title>ERP Dashboard | MBSG</title>

    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">


    <!-- Our Clean Stylesheets -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/superadmin.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<!-- Layout.js will automatically fetch and inject the Sidebar and Header here -->
<div id="sidebar-container"></div>
<div id="header-container"></div>

<!-- Layout.js will automatically fetch and inject all your views here! -->
<main class="main-content" id="main-content-area">
    <!-- This area stays empty in the HTML file -->
</main>

<!-- PERFECT: Template tags must go inside the body -->
<template id="loaderTemplate">
    <div class="loader-container">
        <div class="spinner-border"></div>
        <p>Loading...</p>
    </div>
</template>

<template id="errorTemplate">
    <div class="error-container">
        <h2>404 - View Not Found</h2>
        <p>The requested module does not exist.</p>
    </div>
</template>

<template id="systemErrorTemplate">
    <div class="error-container">
        <h2>System Error</h2>
        <p>Failed to communicate with the server.</p>
    </div>
</template>
<!-- ========================================== -->
<!-- PREMIUM REUSABLE MODAL TEMPLATES           -->
<!-- ========================================== -->
<template id="premium-modal-template">
    <div class="premium-modal-overlay">
        <div class="premium-modal-box">
            <div class="premium-modal-header">
                <div class="premium-modal-icon"><i class="bi"></i></div>
                <h3 class="pm-title"></h3>
            </div>
            <div class="premium-modal-body"></div>
            <div class="premium-modal-footer">
                <button class="premium-modal-btn-secondary pm-btn-cancel hidden"></button>
                <button class="premium-modal-btn-primary pm-btn-confirm"></button>
            </div>
        </div>
    </div>
</template>

<template id="branch-success-content-template">
    <div class="pm-text-block">
        The branch <strong class="success-branch-name"></strong> has been successfully configured.
    </div>
    <div class="pm-text-block pm-spacer">
        An Administrator account was automatically generated. Please securely save these credentials:
    </div>
    <div class="credentials-box">
        <p><strong>Username:</strong> <span class="cred-username"></span></p>
        <p><strong>Password:</strong> <span class="cred-password"></span></p>
    </div>
</template>

<!-- GLOBAL TABLE TEMPLATES -->
<template id="global-table-empty-template">
    <tr>
        <td class="empty-cell text-center text-muted p-4 message-cell"></td>
    </tr>
</template>

<template id="global-table-fetching-template">
    <tr>
        <td class="text-center p-4 text-muted message-cell">
            <i class="bi bi-hourglass-split me-2"></i><span class="fetching-text"></span>
        </td>
    </tr>
</template>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/global.js"></script>
<script src="/js/superadmin.js"></script>
<script src="/js/branchadmin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</body>
</html>
