server.port=8081

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:montfortug}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=28800000
jwt.password-change-expiration=${JWT_PASSWORD_CHANGE_EXPIRATION:900000}

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# DEFAULT / FALLBACK EMAIL
# Keep this until all email methods use BranchMailSenderFactory.
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# BRANCH-WISE EMAIL
# Branch email addresses remain in erp_branches.branch_email.
# Only branch Google App Passwords come from environment variables.
# ===============================
erp.mail.host=smtp.gmail.com
erp.mail.port=587
erp.mail.auth=true
erp.mail.starttls-enabled=true
erp.mail.starttls-required=true

erp.mail.branch-passwords.u011=${BRANCH_U011_MAIL_PASSWORD}
erp.mail.branch-passwords.u021=${BRANCH_U021_MAIL_PASSWORD}
erp.mail.branch-passwords.u031=${BRANCH_U031_MAIL_PASSWORD}

# ===============================
# APPLICATION URL
# ===============================
app.frontend.url=https://erp.montfortbrothersuganda.com

# ===============================
# STORAGE
# ===============================
# Public application portal files
erp.storage.location=${ERP_STORAGE_LOCATION:uploads}

# Private ERP employee/student files
erp.storage.private-location=${ERP_STORAGE_PRIVATE_LOCATION:erp-storage}
