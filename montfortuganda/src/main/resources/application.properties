spring.application.name=montfortuganda
spring.profiles.default=dev
server.port=${SERVER_PORT:8081}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=28800000
jwt.password-change-expiration=${JWT_PASSWORD_CHANGE_EXPIRATION:900000}

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# CENTRAL ERP EMAIL
# The official ERP account sends all emails. Branch email addresses are
# recipients and Reply-To addresses; they are never SMTP usernames.
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
erp.mail.from-name=${MAIL_FROM_NAME:Montfort ERP}

# ===============================
# APPLICATION URL
# ===============================
app.frontend.url=https://erp.montfortbrothersuganda.com

# ===============================
# STORAGE
# ===============================
# Public application portal files
erp.storage.location=${ERP_STORAGE_LOCATION:uploads}

# Private ERP employee/student files
erp.storage.private-location=${ERP_STORAGE_PRIVATE_LOCATION:erp-storage}

# ===============================
# DEVELOPMENT BOOTSTRAP ACCOUNT
# Disabled by default. Production never loads the development seeder.
# ===============================
erp.bootstrap-admin.enabled=${ERP_BOOTSTRAP_ADMIN_ENABLED:false}
erp.bootstrap-admin.username=${ERP_BOOTSTRAP_ADMIN_USERNAME:}
erp.bootstrap-admin.password=${ERP_BOOTSTRAP_ADMIN_PASSWORD:}

# ===============================
# EXTERNAL WEBSITE DONATIONS
# Keep disabled until GoDaddy remote MySQL access is available.
# This makes donation endpoints fail fast with HTTP 503 instead of delaying
# unrelated ERP work while the remote database is unavailable.
# ===============================
erp.donations.external-enabled=${WEBSITE_DB_ENABLED:false}
