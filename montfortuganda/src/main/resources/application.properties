spring.application.name=montfortuganda
spring.profiles.default=dev
server.port=${SERVER_PORT:8081}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=28800000
jwt.password-change-expiration=${JWT_PASSWORD_CHANGE_EXPIRATION:900000}

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# CENTRAL ERP EMAIL
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${CENTRAL_MAIL_USERNAME}
spring.mail.password=${CENTRAL_MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
erp.mail.from-name=${MAIL_FROM_NAME:Montfort ERP}


# ===============================
# BRANCH-WISE EMAIL
# ===============================
erp.mail.protocol=smtp
erp.mail.host=smtp.gmail.com
erp.mail.port=587
erp.mail.auth=true
erp.mail.starttls-enabled=true
erp.mail.starttls-required=true
erp.mail.connection-timeout=10000
erp.mail.read-timeout=10000
erp.mail.write-timeout=10000
erp.mail.ssl-trust=smtp.gmail.com

erp.mail.branch-passwords.u011=${U011_MAIL_APP_PASSWORD}
erp.mail.branch-passwords.u021=${U021_MAIL_APP_PASSWORD}
erp.mail.branch-passwords.u031=${U031_MAIL_APP_PASSWORD}

# ===============================
# APPLICATION URL
# ===============================
app.frontend.url=https://erp.montfortbrothersuganda.com

# ===============================
# STORAGE
# ===============================
erp.storage.location=${ERP_STORAGE_LOCATION:uploads}
erp.storage.private-location=${ERP_STORAGE_PRIVATE_LOCATION:erp-storage}

# ===============================
# DEVELOPMENT BOOTSTRAP ACCOUNT
# ===============================
erp.bootstrap-admin.enabled=${ERP_BOOTSTRAP_ADMIN_ENABLED:false}
erp.bootstrap-admin.username=${ERP_BOOTSTRAP_ADMIN_USERNAME:}
erp.bootstrap-admin.password=${ERP_BOOTSTRAP_ADMIN_PASSWORD:}

# ===============================
# EXTERNAL WEBSITE DONATIONS
# ===============================
erp.donations.external-enabled=${WEBSITE_DB_ENABLED:false}

# ===============================
# TEMPORARY PERFORMANCE LOGGING
# Remove after performance testing is complete.
# ===============================
logging.level.com.zaxxer.hikari=INFO
