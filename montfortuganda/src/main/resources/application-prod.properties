server.port=${SERVER_PORT:8081}

# =========================================================
# PRODUCTION ERP DATABASE
# Spring Boot on VPS -> VPS loopback -> MySQL production schema
# =========================================================

app.datasource.erp.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:montfortug_erp_prod}?sslMode=${DB_SSL_MODE:PREFERRED}&allowPublicKeyRetrieval=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true
app.datasource.erp.username=${DB_USERNAME:erp_prod_user}
app.datasource.erp.password=${DB_PASSWORD:}
app.datasource.erp.driver-class-name=com.mysql.cj.jdbc.Driver

app.datasource.erp.hikari.pool-name=MontfortErpProdPool

# Pool capacity
app.datasource.erp.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:15}
app.datasource.erp.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}

# Connection acquisition and validation
app.datasource.erp.hikari.connection-timeout=10000
app.datasource.erp.hikari.validation-timeout=3000

# Keep production connections stable
app.datasource.erp.hikari.idle-timeout=0
app.datasource.erp.hikari.max-lifetime=1800000
app.datasource.erp.hikari.keepalive-time=300000

# Production must fail startup if the ERP database is unavailable
app.datasource.erp.hikari.initialization-fail-timeout=10000


# =========================================================
# WEBSITE DATABASE
# GoDaddy website database
# Dedicated SELECT-only account
# =========================================================

app.datasource.website.url=jdbc:mysql://${WEBSITE_DB_HOST:invalid.invalid}:${WEBSITE_DB_PORT:3306}/${WEBSITE_DB_NAME:missing}?sslMode=${WEBSITE_DB_SSL_MODE:VERIFY_IDENTITY}&allowPublicKeyRetrieval=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&connectTimeout=3000&socketTimeout=10000&tcpKeepAlive=true
app.datasource.website.username=${WEBSITE_DB_USERNAME:}
app.datasource.website.password=${WEBSITE_DB_PASSWORD:}
app.datasource.website.driver-class-name=com.mysql.cj.jdbc.Driver

app.datasource.website.hikari.pool-name=MontfortWebsiteReadPool
app.datasource.website.hikari.read-only=true

app.datasource.website.hikari.maximum-pool-size=3
app.datasource.website.hikari.minimum-idle=0

app.datasource.website.hikari.connection-timeout=3000
app.datasource.website.hikari.validation-timeout=2000
app.datasource.website.hikari.idle-timeout=120000
app.datasource.website.hikari.max-lifetime=300000
app.datasource.website.hikari.keepalive-time=60000

# Website DB failure must not stop the ERP
app.datasource.website.hikari.initialization-fail-timeout=-1