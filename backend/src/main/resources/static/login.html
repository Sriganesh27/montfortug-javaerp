<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/Images/logo_MBSG_UG_8.webp">
    <title>ERP Login | Montfort Brothers of St. Gabriel:Uganda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, rgba(59, 130, 246, 0) 70%);
            border-radius: 50%;
            z-index: 1;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px; 
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: white;
            box-sizing: border-box;
        }
        select option {
            background: #1e3a8a;
            color: white;
        }
        .login-header h2 { font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 1.4rem; }
        .login-header p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; margin-bottom: 6px; color: rgba(255, 255, 255, 0.9); text-transform: uppercase; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 1rem; color: #3b82f6; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px 12px 45px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 0.9rem; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 14px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        #message { display: none; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="login-container">
        <div class="login-header">
            <h2>Montfort Brothers of St. Gabriel:Uganda ERP</h2>
            <p>Institutional Login Portal</p>
        </div>
        
        <div id="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Campus Location</label>
                <div class="input-wrapper">
                    <i class="fa fa-school"></i>
                    <select name="branch_id" id="branchSelect">
                        <option value="1">St. Kizito (Kyebando)</option>
                        <option value="2">St. Montfort (Mpala)</option>
                        <option value="3">Pere Achte (Isunga)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Account Role</label>
                <div class="input-wrapper">
                    <i class="fa fa-user-shield"></i>
                    <select name="role" id="roleSelect" required>
                        <option value="Parents">Parents</option>
                        <option value="Faculty">Faculty</option>
                        <option value="Branch Admin">Branch Admin</option>
                        <option value="Super User">Super User</option>     
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Credentials</label>
                <div class="input-wrapper">
                    <i class="fa fa-user"></i>
                    <input type="text" name="username" placeholder="Username / Email" autocomplete="username" required>
                </div>
            </div>
            <div class="form-group">
                <label>Security</label>
                <div class="input-wrapper">
                    <i class="fa fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                </div>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <div class="footer-text" style="margin-top:20px; font-size:0.8rem; opacity:0.7;">
            &copy; <span id="currentYear"></span> Montfort Brothers
        </div>
    </div>

    <script>document.getElementById('currentYear').textContent = new Date().getFullYear();</script>
    <script src="/assets/scripts/login.js"></script>
</body>
</html>
